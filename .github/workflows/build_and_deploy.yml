name: Build and Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 0'  # Every Sunday at 6:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install package
      run: |
        pip install -e .
    
    - name: Create data directories
      run: |
        mkdir -p data/raw data/processed
    
    - name: Check API config exists
      run: |
        if [ ! -f "config/api_endpoints.yml" ]; then
          echo "ERROR: config/api_endpoints.yml not found!"
          echo "Copy config/api_endpoints.yml.example to config/api_endpoints.yml"
          exit 1
        fi
        echo "API config file found"
    
    - name: Fetch data from APIs
      run: |
        set -e  # Exit on error
        export PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}/src"
        python -m edmonton_growth.fetch_data
      env:
        PYTHONPATH: ${{ github.workspace }}/src
    
    - name: Run pipeline
      run: |
        export PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}/src"
        python -m edmonton_growth.run_all
      env:
        PYTHONUNBUFFERED: 1
        PYTHONPATH: ${{ github.workspace }}/src
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './site'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
