name: Build and Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 0'  # Every Sunday at 6:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install package
      run: |
        pip install -e .
    
    - name: Create data directories
      run: |
        mkdir -p data/raw data/processed
    
    - name: Check API config exists
      run: |
        if [ ! -f "config/api_endpoints.yml" ]; then
          echo "ERROR: config/api_endpoints.yml not found!"
          echo "Copy config/api_endpoints.yml.example to config/api_endpoints.yml"
          exit 1
        fi
        echo "API config file found"
    
    - name: Fetch data from APIs
      run: |
        export PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}/src"
        python -m edmonton_growth.fetch_data 2>&1 | tee fetch_log.txt
        echo "Fetch step completed with exit code: $?"
      continue-on-error: true
      id: fetch_data
      env:
        PYTHONPATH: ${{ github.workspace }}/src
    
    - name: Show fetch logs
      if: always()
      run: |
        echo "=== Fetch Data Logs ==="
        cat fetch_log.txt || echo "No log file found"
        echo "=== End Logs ==="
    
    - name: Verify required data files
      run: |
        echo "Checking for required data files..."
        ls -la data/raw/ || echo "No files in data/raw/"
        
        # Check for neighbourhoods (required)
        if [ ! -f "data/raw/neighbourhoods.geojson" ] && [ ! -f "data/raw/neighbourhoods.csv" ]; then
          echo "ERROR: Required file 'neighbourhoods.geojson' or 'neighbourhoods.csv' not found!"
          echo "API fetch failed. Check the fetch_data step logs above."
          exit 1
        fi
        
        # Check for business_licences (required)
        if [ ! -f "data/raw/business_licences.csv" ]; then
          echo "ERROR: Required file 'business_licences.csv' not found!"
          echo "API fetch failed. Check the fetch_data step logs above."
          exit 1
        fi
        
        # Check for zoning (required)
        if [ ! -f "data/raw/Zoning_Bylaw_Geographical_Data_20260301.geojson" ] && [ ! -f "data/raw/Zoning_Bylaw_Geographical_Data_20260301.csv" ]; then
          echo "ERROR: Required file 'Zoning_Bylaw_Geographical_Data_20260301.geojson' or '.csv' not found!"
          echo "API fetch failed. Check the fetch_data step logs above."
          exit 1
        fi
        
        echo "✅ All required data files found"
    
    - name: Run pipeline
      run: |
        export PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}/src"
        python -m edmonton_growth.run_all
      env:
        PYTHONUNBUFFERED: 1
        PYTHONPATH: ${{ github.workspace }}/src
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './site'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
